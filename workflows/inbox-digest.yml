name: inbox-digest
description: Digest of recent unread Outlook email (Windows / Outlook required)
version: 1.0.0
tags: [ericsson, outlook, email]
requires:
  toolsets: []              # Outlook arrives via MCP; validated at runtime
  env: [ERICSSON_ENV]
inputs:
  - {name: since, default: 1d}
  - {name: limit, default: "15"}
nodes:
  - id: collect
    kind: tool
    prompt: >
      Using the Outlook MCP message_list tool, list unread inbox mail from the
      last $inputs.since (limit $inputs.limit). For any message that looks
      important but truncated, use message_read for the full body. Save the
      collected data as inbox.json.
    output: inbox.json
  - id: digest
    kind: prompt
    depends_on: [collect]
    prompt: >
      Read inbox.json and write digest.md: group by sender/thread, one line
      each with why it matters; end with an "action needed" list (max 5).
    output: digest.md
report:
  kanban: auto
  notify: []
