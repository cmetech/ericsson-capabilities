# mcp_servers entries for the `ericsson` capability set.
# The staging seam merges these into the brand's config.yaml, resolving
# ${CAPABILITY_DIR} to where mcpLocal content was staged. Entries with
# unresolved ${ENV_VAR} placeholders (e.g. glean without GLEAN_MCP_URL set)
# should be merged but remain inert until the user supplies values.
mcp_servers:
  outlook:
    # Windows-only: PowerShell -> COM against the logged-in Outlook desktop.
    command: python
    args: ["${CAPABILITY_DIR}/outlook-mcp/run_server.py"]
    env: {}
    timeout: 120
  glean:
    # Internal Glean MCP endpoint (CPI/document search). Values from Keys page.
    url: "${GLEAN_MCP_URL}"
    headers:
      Authorization: "Bearer ${GLEAN_API_TOKEN}"
